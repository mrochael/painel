<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADOLESC COIMBRA DNA — Ranking</title>
  <meta name="description" content="Painel de ranking gamificado para evento ADOLESC COIMBRA DNA">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─────────────── RESET & BASE ─────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary:    #06090f;
      --bg-card:       rgba(17, 22, 32, 0.7);
      --bg-bar-track:  rgba(255,255,255,0.04);
      --text-primary:  #f1f3fc;
      --text-muted:    #6b7280;
      --border-subtle: rgba(255,255,255,0.06);
      --bar-max-height: 260px;
      --transition-bar: 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ─────────────── AMBIENT BACKGROUND ─────────────── */
    .ambient {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .ambient .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      animation: float 20s ease-in-out infinite alternate;
    }
    .ambient .orb--1 { width: 600px; height: 600px; top: -15%; left: -10%;  background: #69daff; }
    .ambient .orb--2 { width: 500px; height: 500px; bottom: -10%; right: -8%; background: #ff7168; animation-delay: -7s; }
    .ambient .orb--3 { width: 400px; height: 400px; top: 30%; left: 50%;     background: #ffd709; animation-delay: -14s; }

    @keyframes float {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.15); }
    }

    /* ─────────────── SCANLINE EFFECT ─────────────── */
    .scanline {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.008) 2px,
        rgba(255,255,255,0.008) 4px
      );
    }

    /* ─────────────── HEADER ─────────────── */
    .header {
      position: relative; z-index: 10;
      text-align: center;
      margin-bottom: 48px;
    }
    .header__badge {
      display: inline-block;
      padding: 6px 20px;
      border-radius: 100px;
      background: rgba(105, 218, 255, 0.08);
      border: 1px solid rgba(105, 218, 255, 0.15);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #69daff;
      margin-bottom: 16px;
    }
    .header__title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      line-height: 1.1;
      background: linear-gradient(135deg, #f1f3fc 30%, #69daff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header__sub {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ─────────────── RANKING GRID ─────────────── */
    .ranking {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(12px, 2vw, 24px);
      width: 90%;
      max-width: 900px;
    }

    /* ─────────────── TEAM CARD ─────────────── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 20px 12px 24px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(180deg, var(--team-color, transparent) 0%, transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.25;
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-4px);
    }

    /* ─────────────── LEADER HIGHLIGHT ─────────────── */
    .card.leader {
      transform: scale(1.05);
      box-shadow:
        0 0 40px color-mix(in srgb, var(--team-color) 50%, transparent),
        0 0 80px color-mix(in srgb, var(--team-color) 25%, transparent);
    }
    .card.leader:hover {
      transform: scale(1.05) translateY(-4px);
    }
    .card.leader::before {
      opacity: 0.5;
    }

    /* Rank badge */
    .card__rank {
      font-size: clamp(20px, 3vw, 32px);
      font-weight: 700;
      color: var(--team-color);
      line-height: 1;
      margin-bottom: 4px;
    }
    .card__rank-icon {
      width: 20px; height: 20px;
      margin-bottom: 16px;
      opacity: 0.7;
    }

    /* Bar container */
    .card__bar-wrap {
      width: 100%;
      height: var(--bar-max-height);
      background: var(--bg-bar-track);
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    /* Animated fill */
    .card__bar-fill {
      width: 100%;
      height: 0%;
      border-radius: 12px 12px 0 0;
      position: relative;
      transition: height var(--transition-bar);
      background: linear-gradient(0deg, var(--team-color) 0%, color-mix(in srgb, var(--team-color) 60%, white) 100%);
    }
    .card__bar-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.15) 0%, transparent 50%, rgba(255,255,255,0.08) 100%);
      border-radius: inherit;
    }

    /* Glow under bar */
    .card__bar-glow {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 80%; height: 40px;
      border-radius: 50%;
      filter: blur(20px);
      background: var(--team-color);
      opacity: 0.35;
      transition: opacity 0.6s ease;
    }

    /* Score */
    .card__score {
      margin-top: 16px;
      font-size: clamp(18px, 2.5vw, 28px);
      font-weight: 700;
      color: var(--team-color);
      letter-spacing: -0.02em;
      text-shadow: 0 0 20px color-mix(in srgb, var(--team-color) 40%, transparent);
    }

    /* Team name */
    .card__name {
      margin-top: 6px;
      font-size: clamp(9px, 1.2vw, 13px);
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: center;
      transition: color 0.3s ease;
    }
    .card:hover .card__name {
      color: var(--text-primary);
    }

    /* Crown SVG for #1 */
    .crown-icon {
      fill: var(--team-color);
      filter: drop-shadow(0 0 6px var(--team-color));
    }

    /* ─────────────── PULSE DOT (live indicator) ─────────────── */
    .live-dot {
      position: fixed;
      bottom: 24px; right: 28px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .live-dot__circle {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.8); }
    }

    /* ─────────────── ERROR STATE ─────────────── */
    .live-dot--error .live-dot__circle {
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
      animation: none;
    }

    /* ─────────────── ENTRANCE ANIMATION ─────────────── */
    .card {
      opacity: 0;
      transform: translateY(30px);
      animation: card-enter 0.6s ease forwards;
    }
    .card.leader {
      animation: card-enter-leader 0.6s ease forwards;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    @keyframes card-enter {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes card-enter-leader {
      to { opacity: 1; transform: scale(1.05); }
    }

    /* ─────────────── RESPONSIVE ─────────────── */
    @media (max-width: 600px) {
      .ranking { gap: 8px; width: 95%; }
      .card { padding: 12px 8px 16px; border-radius: 12px; }
      :root { --bar-max-height: 160px; }
    }
  </style>
</head>
<body>

  <!-- Ambient Background -->
  <div class="ambient" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
  </div>
  <div class="scanline" aria-hidden="true"></div>

  <!-- Header -->
  <header class="header">
    <div class="header__badge">Evento ao Vivo</div>
    <h1 class="header__title">Ranking Geral</h1>
    <p class="header__sub">ADOLESC COIMBRA DNA</p>
  </header>

  <!-- Ranking Container -->
  <section class="ranking" id="ranking" aria-label="Ranking de equipes"></section>

  <!-- Live indicator -->
  <div class="live-dot" id="liveIndicator">
    <span class="live-dot__circle"></span>
    <span>LIVE</span>
  </div>

  <script>
    /* ════════════════════════════════════════════════
       CONSTANTES
       ════════════════════════════════════════════════ */
    var STORAGE_KEY    = 'rankingData';
    var SCHEMA_VERSION = 1;
    var POLL_INTERVAL  = 1000;
    var DATA_URL       = 'data.json';
    var FALLBACK_DATA  = {
      version: 1,
      maxScore: 25000,
      teams: [
        { name: 'HERDEIROS',     score: 0, color: '#69daff' },
        { name: 'ELEITOS',       score: 0, color: '#ffd709' },
        { name: 'EMBAIXADORES',  score: 0, color: '#ff7168' },
        { name: 'RESGATADOS',    score: 0, color: '#00cffc' }
      ]
    };

    /* ════════════════════════════════════════════════
       ESTADO
       ════════════════════════════════════════════════ */
    var lastRenderedJSON = '';

    /* ════════════════════════════════════════════════
       UTILITÁRIOS
       ════════════════════════════════════════════════ */

    /**
     * Garante que o valor está entre 0 e maxScore, sem NaN.
     * @param {number} value
     * @param {number} maxScore
     * @returns {number}
     */
    function clampScore(value, maxScore) {
      if (isNaN(value)) return 0;
      return Math.min(maxScore, Math.max(0, value));
    }

    /**
     * Sanitiza todas as equipes do objeto data.
     * @param {Object} d
     */
    function sanitizeTeams(d) {
      for (var i = 0; i < d.teams.length; i++) {
        d.teams[i].score = clampScore(d.teams[i].score, d.maxScore);
      }
    }

    /**
     * Formata número com separador de milhar (pt-BR)
     * @param {number} n
     * @returns {string}
     */
    function formatNumber(n) {
      return n.toLocaleString('pt-BR');
    }

    /**
     * Calcula percentual proporcional (0–100) com proteção contra divisão por zero
     * @param {number} score
     * @param {number} maxScore
     * @returns {number}
     */
    function calcPercent(score, maxScore) {
      if (!maxScore || maxScore <= 0) return 0;
      var pct = (score / maxScore) * 100;
      return Math.min(Math.max(pct, 0), 100);
    }

    /**
     * Gera SVG de coroa para o #1
     * @param {string} color
     * @returns {string}
     */
    function crownSVG(color) {
      return '<svg class="crown-icon" style="--team-color:' + color + '" viewBox="0 0 24 24" width="22" height="22">' +
        '<path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm0 2h14v2H5v-2z"/>' +
      '</svg>';
    }

    /**
     * Gera ícone genérico (estrela) para posições 2+
     * @param {string} color
     * @returns {string}
     */
    function starSVG(color) {
      return '<svg style="fill:' + color + '; opacity:0.5;" viewBox="0 0 24 24" width="16" height="16">' +
        '<path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7L12 16.4 5.7 21l2.3-7L2 9.4h7.6z"/>' +
      '</svg>';
    }

    /* ════════════════════════════════════════════════
       CARREGAMENTO DE DADOS (localStorage + fallback)
       ════════════════════════════════════════════════ */

    /**
     * Tenta carregar o estado do localStorage.
     * @returns {Object|null}
     */
    function loadFromStorage() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;

        var parsed = JSON.parse(raw);

        // Validar version
        if (!parsed || parsed.version !== SCHEMA_VERSION) return null;

        // Validar shape
        if (!Array.isArray(parsed.teams) || typeof parsed.maxScore !== 'number') return null;

        // Sanitizar
        sanitizeTeams(parsed);

        return parsed;
      } catch (e) {
        console.warn('[Painel] localStorage corrompido, usando fallback');
        return null;
      }
    }

    /**
     * Carrega dados do data.json, injeta version, persiste e retorna via callback.
     * @param {function} callback
     */
    function loadFromJSON(callback) {
      fetch(DATA_URL + '?t=' + new Date().getTime())
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(jsonData) {
          if (!jsonData || !Array.isArray(jsonData.teams)) {
            throw new Error('Formato inválido');
          }
          // Injetar version
          jsonData.version = SCHEMA_VERSION;
          // Sanitizar
          sanitizeTeams(jsonData);
          // Persistir imediatamente
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(jsonData));
          } catch (e) {
            console.warn('[Painel] Falha ao persistir após carga JSON:', e.message);
          }
          callback(jsonData);
        })
        .catch(function(err) {
          console.warn('[Painel] fetch falhou (' + err.message + '), usando dados embutidos');
          var fallback = JSON.parse(JSON.stringify(FALLBACK_DATA));
          sanitizeTeams(fallback);
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(fallback));
          } catch (e) {
            console.warn('[Painel] Falha ao persistir fallback:', e.message);
          }
          callback(fallback);
        });
    }

    /**
     * Carrega dados (localStorage ou fallback) e renderiza se mudou.
     */
    function loadData() {
      var stored = loadFromStorage();
      if (stored) {
        processAndRender(stored);
      } else {
        loadFromJSON(function(d) {
          processAndRender(d);
        });
      }
    }

    /**
     * Compara estado e renderiza apenas se mudou.
     * @param {Object} data
     */
    function processAndRender(data) {
      var json = JSON.stringify(data);

      if (json === lastRenderedJSON) {
        // Dados idênticos — não toca no DOM
        setLiveStatus(true);
        return;
      }

      lastRenderedJSON = json;
      renderRanking(data);
      setLiveStatus(true);
    }

    /* ════════════════════════════════════════════════
       RENDERIZAÇÃO
       ════════════════════════════════════════════════ */

    /**
     * Renderiza um card de equipe
     * @param {Object} team   - { name, score, color }
     * @param {number} rank   - posição (1-indexed)
     * @param {number} maxScore
     * @param {boolean} isLeader
     * @returns {string} HTML
     */
    function renderCard(team, rank, maxScore, isLeader) {
      var pct   = calcPercent(team.score, maxScore);
      var icon  = rank === 1 ? crownSVG(team.color) : starSVG(team.color);
      var leaderClass = isLeader ? ' leader' : '';

      return '' +
        '<article class="card' + leaderClass + '" style="--team-color:' + team.color + ';" aria-label="' + team.name + ', posição ' + rank + '">' +
          '<span class="card__rank">#' + rank + '</span>' +
          '<div class="card__rank-icon">' + icon + '</div>' +
          '<div class="card__bar-wrap">' +
            '<div class="card__bar-fill" data-pct="' + pct + '"></div>' +
            '<div class="card__bar-glow"></div>' +
          '</div>' +
          '<span class="card__score">' + formatNumber(team.score) + '</span>' +
          '<span class="card__name">' + team.name + '</span>' +
        '</article>';
    }

    /**
     * Renderiza o ranking completo no container
     * @param {Object} data - { version, maxScore, teams }
     */
    function renderRanking(data) {
      var container = document.getElementById('ranking');

      // Ordena por score DESC
      var sorted = data.teams.slice().sort(function(a, b) {
        return b.score - a.score;
      });

      // Gera HTML — primeiro é líder
      var html = '';
      for (var i = 0; i < sorted.length; i++) {
        html += renderCard(sorted[i], i + 1, data.maxScore, i === 0);
      }

      // Limpa e insere
      container.innerHTML = html;

      // Anima barras (precisa forçar reflow antes de setar a altura)
      requestAnimationFrame(function() {
        var fills = container.querySelectorAll('.card__bar-fill');
        for (var j = 0; j < fills.length; j++) {
          fills[j].style.height = fills[j].getAttribute('data-pct') + '%';
        }
      });
    }

    /**
     * Atualiza indicador de status (live/error)
     * @param {boolean} ok
     */
    function setLiveStatus(ok) {
      var el = document.getElementById('liveIndicator');
      if (ok) {
        el.classList.remove('live-dot--error');
      } else {
        el.classList.add('live-dot--error');
      }
    }

    /* ════════════════════════════════════════════════
       INICIALIZAÇÃO + POLLING
       ════════════════════════════════════════════════ */
    loadData();
    setInterval(loadData, POLL_INTERVAL);
  </script>

</body>
</html>
