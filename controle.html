<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADOLESC COIMBRA DNA — Controle</title>
  <meta name="description" content="Painel de controle do ranking gamificado ADOLESC COIMBRA DNA">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ─────────────── RESET & BASE ─────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary:    #06090f;
      --bg-card:       rgba(17, 22, 32, 0.85);
      --bg-input:      rgba(255,255,255,0.05);
      --text-primary:  #f1f3fc;
      --text-muted:    #6b7280;
      --border-subtle: rgba(255,255,255,0.08);
      --btn-hover:     rgba(255,255,255,0.08);
      --danger:        #ef4444;
      --danger-hover:  #dc2626;
    }

    html, body {
      width: 100%; min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 80px;
      position: relative;
    }

    /* ─────────────── AMBIENT BACKGROUND ─────────────── */
    .ambient {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .ambient .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.08;
    }
    .ambient .orb--1 { width: 500px; height: 500px; top: -15%; left: -10%;  background: #69daff; }
    .ambient .orb--2 { width: 400px; height: 400px; bottom: -10%; right: -8%; background: #ff7168; }

    /* ─────────────── HEADER ─────────────── */
    .header {
      position: relative; z-index: 10;
      text-align: center;
      margin-bottom: 32px;
    }
    .header__badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 100px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ef4444;
      margin-bottom: 12px;
    }
    .header__title {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      line-height: 1.1;
      background: linear-gradient(135deg, #f1f3fc 30%, #69daff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header__sub {
      margin-top: 6px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ─────────────── TEAM CONTROLS ─────────────── */
    .controls {
      position: relative; z-index: 10;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .team-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 14px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease;
    }
    .team-row:hover {
      border-color: var(--team-color);
    }
    .team-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--team-color);
      border-radius: 4px 0 0 4px;
    }

    .team-row__name {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--team-color);
      min-width: 100px;
      flex-shrink: 0;
    }

    .team-row__input {
      width: 80px;
      padding: 8px 10px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      -moz-appearance: textfield;
    }
    .team-row__input::-webkit-inner-spin-button,
    .team-row__input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .team-row__input:focus {
      border-color: var(--team-color);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--team-color) 20%, transparent);
    }

    .team-row__actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }

    .btn-inc {
      padding: 7px 12px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: transparent;
      color: var(--text-primary);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
      white-space: nowrap;
      user-select: none;
    }
    .btn-inc:hover {
      background: var(--btn-hover);
      border-color: var(--team-color);
    }
    .btn-inc:active {
      transform: scale(0.95);
    }

    /* ─────────────── RESET BUTTON ─────────────── */
    .actions-bar {
      position: relative; z-index: 10;
      width: 100%;
      max-width: 480px;
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }

    .btn-reset {
      padding: 12px 32px;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.08);
      color: var(--danger);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.1s ease;
      user-select: none;
    }
    .btn-reset:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: var(--danger);
    }
    .btn-reset:active {
      transform: scale(0.95);
    }

    /* ─────────────── STATUS BAR ─────────────── */
    .status-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: rgba(17, 22, 32, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border-subtle);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .status-bar__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }
    .status-bar--error .status-bar__dot {
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }

    /* ─────────────── RESPONSIVE ─────────────── */
    @media (max-width: 480px) {
      .team-row {
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px;
      }
      .team-row__name {
        min-width: 80px;
        font-size: 10px;
      }
      .team-row__input {
        width: 70px;
        font-size: 13px;
      }
      .team-row__actions {
        margin-left: 0;
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>

  <!-- Ambient Background -->
  <div class="ambient" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header__badge">Painel de Controle</div>
    <h1 class="header__title">Controle de Placar</h1>
    <p class="header__sub">ADOLESC COIMBRA DNA</p>
  </header>

  <!-- Team Controls -->
  <section class="controls" id="controls" aria-label="Controles de pontuação"></section>

  <!-- Reset Button -->
  <div class="actions-bar">
    <button class="btn-reset" id="btnReset" type="button">Zerar Placar</button>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <span class="status-bar__dot"></span>
    <span id="statusText">Carregando...</span>
  </div>

  <script>
    /* ════════════════════════════════════════════════
       CONSTANTES
       ════════════════════════════════════════════════ */
    var STORAGE_KEY    = 'rankingData';
    var SCHEMA_VERSION = 1;
    var DATA_URL       = 'data.json';
    var FALLBACK_DATA  = {
      version: 1,
      maxScore: 25000,
      teams: [
        { name: 'HERDEIROS',     score: 0, color: '#69daff' },
        { name: 'ELEITOS',       score: 0, color: '#ffd709' },
        { name: 'EMBAIXADORES',  score: 0, color: '#ff7168' },
        { name: 'RESGATADOS',    score: 0, color: '#00cffc' }
      ]
    };

    /* ════════════════════════════════════════════════
       ESTADO
       ════════════════════════════════════════════════ */
    var data = null; // { version, maxScore, teams }

    /* ════════════════════════════════════════════════
       UTILITÁRIOS
       ════════════════════════════════════════════════ */

    /**
     * Garante que o valor está entre 0 e maxScore, sem NaN.
     * @param {number} value
     * @param {number} maxScore
     * @returns {number}
     */
    function clampScore(value, maxScore) {
      if (isNaN(value)) return 0;
      return Math.min(maxScore, Math.max(0, value));
    }

    /**
     * Sanitiza todas as equipes do objeto data.
     * @param {Object} d - o objeto data
     */
    function sanitizeTeams(d) {
      for (var i = 0; i < d.teams.length; i++) {
        d.teams[i].score = clampScore(d.teams[i].score, d.maxScore);
      }
    }

    /* ════════════════════════════════════════════════
       PERSISTÊNCIA (localStorage)
       ════════════════════════════════════════════════ */

    /**
     * Persiste o estado atual no localStorage.
     */
    function persistState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.warn('[Controle] Falha ao persistir:', e.message);
      }
    }

    /**
     * Tenta carregar o estado do localStorage.
     * @returns {Object|null}
     */
    function loadFromStorage() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;

        var parsed = JSON.parse(raw);

        // Validar version
        if (!parsed || parsed.version !== SCHEMA_VERSION) return null;

        // Validar shape
        if (!Array.isArray(parsed.teams) || typeof parsed.maxScore !== 'number') return null;

        // Sanitizar
        sanitizeTeams(parsed);

        return parsed;
      } catch (e) {
        console.warn('[Controle] localStorage corrompido, usando fallback');
        return null;
      }
    }

    /**
     * Carrega dados do data.json, injeta version, persiste e retorna via callback.
     * @param {function} callback - recebe o objeto data
     */
    function loadFromJSON(callback) {
      fetch(DATA_URL + '?t=' + new Date().getTime())
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(jsonData) {
          if (!jsonData || !Array.isArray(jsonData.teams)) {
            throw new Error('Formato inválido');
          }
          // Injetar version
          jsonData.version = SCHEMA_VERSION;
          // Sanitizar
          sanitizeTeams(jsonData);
          // Persistir imediatamente
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(jsonData));
          } catch (e) {
            console.warn('[Controle] Falha ao persistir após carga JSON:', e.message);
          }
          callback(jsonData);
        })
        .catch(function(err) {
          console.warn('[Controle] fetch falhou (' + err.message + '), usando dados embutidos');
          // Fallback inline — garante operação mesmo em file://
          var fallback = JSON.parse(JSON.stringify(FALLBACK_DATA));
          sanitizeTeams(fallback);
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(fallback));
          } catch (e) {
            console.warn('[Controle] Falha ao persistir fallback:', e.message);
          }
          callback(fallback);
        });
    }

    /* ════════════════════════════════════════════════
       INICIALIZAÇÃO
       ════════════════════════════════════════════════ */

    /**
     * Inicializa o sistema: localStorage → fallback JSON → render.
     */
    function init() {
      var stored = loadFromStorage();
      if (stored) {
        data = stored;
        renderControls();
        setStatus('Operacional', false);
      } else {
        loadFromJSON(function(d) {
          data = d;
          renderControls();
          setStatus('Operacional', false);
        });
      }
    }

    /* ════════════════════════════════════════════════
       RENDERIZAÇÃO
       ════════════════════════════════════════════════ */

    /**
     * Renderiza os controles de todas as equipes.
     */
    function renderControls() {
      var container = document.getElementById('controls');
      var html = '';

      for (var i = 0; i < data.teams.length; i++) {
        var team = data.teams[i];
        html += '' +
          '<div class="team-row" style="--team-color:' + team.color + ';">' +
            '<span class="team-row__name">' + team.name + '</span>' +
            '<input ' +
              'class="team-row__input" ' +
              'type="number" ' +
              'id="input-' + i + '" ' +
              'data-team="' + i + '" ' +
              'value="' + team.score + '" ' +
              'min="0" ' +
              'max="' + data.maxScore + '" ' +
              'aria-label="Pontuação ' + team.name + '"' +
            '>' +
            '<div class="team-row__actions">' +
              '<button class="btn-inc" type="button" data-team="' + i + '" data-value="100">+100</button>' +
              '<button class="btn-inc" type="button" data-team="' + i + '" data-value="500">+500</button>' +
            '</div>' +
          '</div>';
      }

      container.innerHTML = html;
    }

    /**
     * Atualiza apenas o valor do input de uma equipe (sem re-render completo).
     * @param {number} teamIndex
     */
    function updateInput(teamIndex) {
      var input = document.getElementById('input-' + teamIndex);
      if (input) {
        input.value = data.teams[teamIndex].score;
      }
    }

    /* ════════════════════════════════════════════════
       AÇÕES (EVENTOS)
       ════════════════════════════════════════════════ */

    /**
     * Incrementa o score de uma equipe.
     * @param {number} teamIndex
     * @param {number} delta
     */
    function addScore(teamIndex, delta) {
      var current = data.teams[teamIndex].score;
      data.teams[teamIndex].score = clampScore(current + delta, data.maxScore);
      updateInput(teamIndex);
      persistState();
    }

    /**
     * Define o score de uma equipe a partir do valor do input.
     * @param {number} teamIndex
     * @param {string} rawValue - valor bruto do input
     */
    function setScoreFromInput(teamIndex, rawValue) {
      var parsed = parseInt(rawValue, 10);
      var value = isNaN(parsed) ? 0 : parsed;
      data.teams[teamIndex].score = clampScore(value, data.maxScore);
      updateInput(teamIndex);
      persistState();
    }

    /**
     * Zera o placar de todas as equipes.
     */
    function resetScores() {
      if (!data || !data.teams) return;

      for (var i = 0; i < data.teams.length; i++) {
        data.teams[i].score = 0;
        updateInput(i);
      }
      persistState();
      renderControls();
    }

    /**
     * Atualiza o status visual.
     * @param {string} text
     * @param {boolean} isError
     */
    function setStatus(text, isError) {
      var bar = document.getElementById('statusBar');
      var label = document.getElementById('statusText');
      label.textContent = text;
      if (isError) {
        bar.classList.add('status-bar--error');
      } else {
        bar.classList.remove('status-bar--error');
      }
    }

    /* ════════════════════════════════════════════════
       EVENT DELEGATION
       ════════════════════════════════════════════════ */

    // Delegação de cliques nos botões +100 / +500
    document.getElementById('controls').addEventListener('click', function(e) {
      var btn = e.target.closest('.btn-inc');
      if (!btn) return;

      var teamIndex = parseInt(btn.getAttribute('data-team'), 10);
      var delta = parseInt(btn.getAttribute('data-value'), 10);

      if (isNaN(teamIndex) || isNaN(delta)) return;

      addScore(teamIndex, delta);
    });

    // Delegação de input para edição manual
    document.getElementById('controls').addEventListener('input', function(e) {
      if (!e.target.classList.contains('team-row__input')) return;

      var teamIndex = parseInt(e.target.getAttribute('data-team'), 10);
      if (isNaN(teamIndex)) return;

      setScoreFromInput(teamIndex, e.target.value);
    });

    // Botão zerar
    document.getElementById('btnReset').addEventListener('click', function() {
      if (!data) {
        console.warn('[Controle] Dados ainda não carregados.');
        return;
      }
      if (confirm('Tem certeza que deseja zerar o placar de todas as equipes?')) {
        resetScores();
      }
    });

    /* ════════════════════════════════════════════════
       INICIALIZAR
       ════════════════════════════════════════════════ */
    init();
  </script>

</body>
</html>
